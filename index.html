<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#101a35" />
    <title>카드마을 &lt;CardVille&gt;</title>
    <style>
      html,body,#app{margin:0;width:100vw;height:100dvh;min-height:100vh;overflow:hidden;background:#071126;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;touch-action:none;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}#app{position:fixed;inset:0;background:#071126 center/cover no-repeat;}
      #boot-fallback{position:fixed;inset:0;z-index:999999;display:block;background:#071126 center/cover no-repeat;}
      #boot-fallback::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(3,8,24,.03),rgba(3,8,24,.08) 50%,rgba(3,8,24,.28) 100%)}
      .boot-note{position:absolute;left:50%;bottom:max(24px,calc(env(safe-area-inset-bottom) + 18px));width:min(340px,88vw);transform:translateX(-50%);text-align:center;color:rgba(230,244,255,.82);font-size:11px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.75)}
      #app canvas{position:relative;z-index:1;display:block;background:#071126;}
    /* no-prestart-button-policy: first visible button is rendered only by Phaser LoginScene */
    </style>
  </head>
  <body>
    <div id="app">
      <div id="boot-fallback" aria-hidden="true" data-cardville-no-prestart-cta="true">
        <div class="boot-note" id="boot-note"></div>
      </div>
    </div>

    <script>
      (function(){
        var fallback = document.getElementById('boot-fallback');
        if (fallback) fallback.style.backgroundImage = "url('./assets/ui/cardville_login_bg.png')";
      })();
    </script>
    <script>
      // Best-effort cleanup for old CardVille service workers. This version does not register a new SW.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs){ regs.forEach(function(r){ r.unregister(); }); }).catch(function(){});
      }
    </script>
    <script>
      window.__CARDVILLE_VERSION__ = '1.0.70';
      window.__CARDVILLE_READY__ = false;
      window.__CARDVILLE_INTRO_VIDEO_STARTED_AT__ = 0;
      window.__CARDVILLE_INTRO_TOUCH_PRIME_TAG__ = 'intro-touch-prime-v169';
      window.__CARDVILLE_INTRO_HARD_VISIBLE_TAG__ = 'intro-hard-visible-v170';

      window.__CARDVILLE_INTRO_VIDEO_PRIME__ = function(){
        var id = 'cardville-intro-video';
        var src = new URL('./assets/video/cardville_intro_loading.mp4?v=1.0.70', document.baseURI).href;
        var old = document.getElementById(id);
        if (old) return old;
        var video = document.createElement('video');
        video.id = id;
        video.src = src;
        video.muted = true;
        video.defaultMuted = true;
        video.autoplay = true;
        video.playsInline = true;
        video.loop = true;
        video.preload = 'auto';
        video.controls = false;
        video.setAttribute('playsinline', 'true');
        video.setAttribute('webkit-playsinline', 'true');
        video.setAttribute('controlsList', 'nodownload noplaybackrate noremoteplayback');
        video.setAttribute('data-cardville-intro-touch-prime-v169', 'true');
        video.setAttribute('data-cardville-min-intro-ms-v168', '3000');
        video.setAttribute('data-cardville-video-only-loading-v168', 'true');
        video.setAttribute('data-cardville-intro-hard-visible-v170', 'true');
        video.style.position = 'fixed';
        video.style.inset = '0';
        video.style.width = '100vw';
        video.style.height = '100dvh';
        video.style.minHeight = '100vh';
        video.style.objectFit = 'cover';
        video.style.zIndex = '2147482000';
        video.style.pointerEvents = 'none';
        video.style.background = '#071126';
        video.style.opacity = '1';
        video.style.display = 'block';
        video.style.visibility = 'visible';
        document.body.appendChild(video);
        document.documentElement.classList.add('cardville-intro-hard-visible-v170');
        if (!window.__CARDVILLE_INTRO_VIDEO_STARTED_AT__ || window.__CARDVILLE_INTRO_VIDEO_STARTED_AT__ <= 0) {
          window.__CARDVILLE_INTRO_VIDEO_STARTED_AT__ = Date.now();
        }
        var revealPrime = function(){ video.style.display = 'block'; video.style.visibility = 'visible'; video.style.opacity = '1'; };
        try { video.load(); } catch(e) {}
        try { video.play().then(revealPrime).catch(function(){ revealPrime(); }); } catch(e) { revealPrime(); }
        return video;
      };
      window.__CARDVILLE_INTRO_VIDEO_PREPARE__ = function(){
        var video = window.__CARDVILLE_INTRO_VIDEO_PRIME__ ? window.__CARDVILLE_INTRO_VIDEO_PRIME__() : null;
        if (!video) return null;
        var src = new URL('./assets/video/cardville_intro_loading.mp4?v=1.0.70', document.baseURI).href;
        if (video.getAttribute('src') !== src && video.currentSrc !== src) video.setAttribute('src', src);
        if (!window.__CARDVILLE_INTRO_VIDEO_STARTED_AT__ || window.__CARDVILLE_INTRO_VIDEO_STARTED_AT__ <= 0) {
          window.__CARDVILLE_INTRO_VIDEO_STARTED_AT__ = Date.now();
        }
        video.autoplay = true;
        video.muted = true;
        video.defaultMuted = true;
        video.playsInline = true;
        video.loop = true;
        video.preload = 'auto';
        video.controls = false;
        video.setAttribute('data-cardville-silent-intro-video-v167', 'true');
        video.setAttribute('data-cardville-intro-touch-prime-v169', 'true');
        video.setAttribute('data-cardville-started-at-zero-guard-v169', 'true');
        video.style.display = 'block';
        video.style.visibility = 'visible';
        video.style.opacity = '1';
        video.style.background = '#071126';
        document.documentElement.classList.add('cardville-intro-hard-visible-v170');
        var reveal = function(){ video.style.display = 'block'; video.style.visibility = 'visible'; video.style.opacity = '1'; };
        video.addEventListener('loadeddata', reveal, { once: true });
        video.addEventListener('canplay', reveal, { once: true });
        video.addEventListener('playing', reveal, { once: true });
        try { video.load(); } catch(e) {}
        try { video.play().then(reveal).catch(function(){ reveal(); }); } catch(e) { reveal(); }
        return video;
      };
      window.__CARDVILLE_INTRO_VIDEO_DONE__ = function(){
        var video = document.getElementById('cardville-intro-video');
        if (video) video.remove();
        document.documentElement.classList.remove('cardville-intro-hard-visible-v170');
        window.__CARDVILLE_INTRO_VIDEO_STARTED_AT__ = 0;
      };
      window.__CARDVILLE_BOOT_OK__ = function(){
        window.__CARDVILLE_READY__ = true;
        var el = document.getElementById('boot-fallback');
        if (el) el.remove();
      };
      // 1.0.70: no generic loading copy on boot; no generic loading copy/bar on boot; the touch-primed opening video is hard-visible from the user tap for at least 3 seconds, then remains until assets are ready.
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
