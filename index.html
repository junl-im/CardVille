<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#101a35" />
    <title>카드마을 &lt;CardVille&gt;</title>
    <style>
      html,body,#app{margin:0;width:100vw;height:100dvh;min-height:100vh;overflow:hidden;background:#071126;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;touch-action:none;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}#app{position:fixed;inset:0;background:#071126 center/cover no-repeat;}
      #boot-fallback{position:fixed;inset:0;z-index:999999;display:block;background:#071126 center/cover no-repeat;}
      #boot-fallback::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(3,8,24,.04),rgba(3,8,24,.08) 45%,rgba(3,8,24,.72) 100%)}
      .boot-start-card{position:absolute;left:50%;bottom:max(86px,calc(env(safe-area-inset-bottom) + 70px));width:min(336px,88vw);transform:translateX(-50%);text-align:center;}
      .boot-message{margin:0 0 14px;padding:13px 16px;border-radius:24px;background:rgba(8,19,41,.54);border:1px solid rgba(255,255,255,.20);box-shadow:0 16px 50px rgba(0,0,0,.25);font-size:15px;font-weight:900;letter-spacing:-.04em;text-shadow:0 2px 8px rgba(0,0,0,.55)}
      .boot-fake-button{height:62px;border-radius:26px;display:grid;place-items:center;background:linear-gradient(180deg,#fff4b8,#ffc75f 52%,#e98d25);border:3px solid rgba(255,255,255,.75);box-shadow:0 14px 0 rgba(91,40,12,.55),0 24px 55px rgba(0,0,0,.36),inset 0 4px 0 rgba(255,255,255,.55);color:#48210e;font-size:21px;font-weight:1000;letter-spacing:-.05em;text-shadow:0 2px 0 rgba(255,255,255,.45)}
      .boot-note{height:18px;margin-top:16px;color:rgba(230,244,255,.86);font-size:11px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.75)}
      #app canvas{position:relative;z-index:1;display:block;background:#071126;}
    </style>
  </head>
  <body>
    <div id="app">
      <div id="boot-fallback" aria-hidden="true">
        <div class="boot-start-card">
          <p class="boot-message">카드를 모아 마을을 완성하세요!</p>
          <div class="boot-fake-button">게임 시작</div>
          <div class="boot-note" id="boot-note"></div>
        </div>
      </div>
    </div>

    <script>
      (function(){
        var fallback = document.getElementById('boot-fallback');
        if (fallback) fallback.style.backgroundImage = "url('./assets/ui/cardville_login_bg.png')";
      })();
    </script>
    <script>
      // Best-effort cleanup for old CardVille service workers. This version does not register a new SW.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs){ regs.forEach(function(r){ r.unregister(); }); }).catch(function(){});
      }
    </script>
    <script>
      window.__CARDVILLE_VERSION__ = '1.0.19';
      window.__CARDVILLE_READY__ = false;
      window.__CARDVILLE_BOOT_OK__ = function(){
        window.__CARDVILLE_READY__ = true;
        var el = document.getElementById('boot-fallback');
        if (el) el.remove();
      };
      setTimeout(function(){
        if (window.__CARDVILLE_READY__) return;
        var note = document.getElementById('boot-note');
        if (note) note.textContent = '시작 화면 준비가 지연되고 있어요. 네트워크 또는 배포 상태를 확인해 주세요.';
      }, 6500);
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
