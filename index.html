<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#101a35" />
    <title>카드마을 &lt;CardVille&gt;</title>
    <style>
      html,body,#app{margin:0;width:100%;height:100%;overflow:hidden;background:#071126;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;touch-action:none;-webkit-tap-highlight-color:transparent;}
      #boot-fallback{position:fixed;inset:0;z-index:999999;display:grid;place-items:center;background:radial-gradient(circle at 50% 18%,#315f9d,#132853 55%,#050814);}
      .boot-card{width:min(330px,88vw);padding:28px 22px;border-radius:28px;text-align:center;border:1px solid rgba(255,255,255,.25);background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.08));box-shadow:0 24px 80px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.28);}
      .boot-logo{width:82px;height:82px;margin:0 auto 16px;display:grid;place-items:center;border-radius:26px;background:linear-gradient(160deg,#e8fbff,#ffe38a);color:#172445;font:900 30px Georgia,serif;box-shadow:0 16px 40px rgba(0,0,0,.25)}
      .boot-title{font-size:24px;font-weight:900;letter-spacing:-.04em}.boot-note{margin-top:10px;color:#d8ecff;font-size:14px;font-weight:800;line-height:1.5}.boot-small{margin-top:16px;color:#91b6e8;font-size:11px;font-weight:800}.boot-bar{height:9px;margin:18px 0;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.18)}.boot-bar span{display:block;width:45%;height:100%;background:linear-gradient(90deg,#8fd3ff,#ffe38a);border-radius:inherit;animation:move 1.1s ease-in-out infinite alternate}@keyframes move{from{transform:translateX(-30%)}to{transform:translateX(160%)}}
    </style>
  </head>
  <body>
    <div id="app">
      <div id="boot-fallback">
        <div class="boot-card">
          <div class="boot-logo">CV</div>
          <div class="boot-title">카드마을을 여는 중</div>
          <div class="boot-note" id="boot-note">게임 엔진을 준비하고 있어요.</div>
          <div class="boot-bar"><span></span></div>
          <div class="boot-small">1.0.8 · Clean Stable Boot</div>
        </div>
      </div>
    </div>

    <script>
      // Best-effort cleanup for old CardVille service workers. This version does not register a new SW.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs){ regs.forEach(function(r){ r.unregister(); }); }).catch(function(){});
      }
    </script>
    <script>
      window.__CARDVILLE_VERSION__ = '1.0.8';
      window.__CARDVILLE_READY__ = false;
      window.__CARDVILLE_BOOT_OK__ = function(){
        window.__CARDVILLE_READY__ = true;
        var el = document.getElementById('boot-fallback');
        if (el) el.remove();
      };
      setTimeout(function(){
        if (window.__CARDVILLE_READY__) return;
        var note = document.getElementById('boot-note');
        if (note) note.textContent = '아직 시작 중입니다. 이 문구가 계속 보이면 GitHub Pages가 최신 dist를 배포했는지 확인하세요.';
      }, 4500);
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
