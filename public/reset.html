<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#101a35" />
    <title>CardVille 자동 복구</title>
    <style>
      html, body { margin: 0; min-height: 100%; background: radial-gradient(circle at 50% 20%, #214f88, #101a35 58%, #060816); color: #fff; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .wrap { min-height: 100vh; display: grid; place-items: center; padding: 28px; box-sizing: border-box; }
      .card { width: min(350px, 100%); border: 1px solid rgba(255,255,255,.26); border-radius: 28px; padding: 28px 22px; text-align: center; background: linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.08)); box-shadow: 0 28px 80px rgba(0,0,0,.28); backdrop-filter: blur(12px); }
      .logo { width: 86px; height: 86px; margin: 0 auto 18px; border-radius: 28px; display: grid; place-items: center; font: 900 32px Georgia, serif; background: linear-gradient(160deg, #dff7ff, #ffd86f); color: #16213e; box-shadow: 0 14px 34px rgba(0,0,0,.25); }
      h1 { margin: 0 0 10px; font-size: 24px; }
      p { margin: 0 0 18px; color: #d8e9ff; line-height: 1.55; font-weight: 700; }
      button { width: 100%; height: 52px; border: 0; border-radius: 18px; font-weight: 900; font-size: 16px; color: #1a2138; background: linear-gradient(180deg, #fff, #bfe9ff); box-shadow: 0 10px 24px rgba(0,0,0,.2); }
      .small { margin-top: 14px; font-size: 12px; color: #9eb7dd; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="logo">CV</div>
        <h1>자동 복구 중</h1>
        <p id="status">이전 버전의 서비스워커와 캐시를 자동으로 정리하고 있어요.</p>
        <button id="go" type="button">카드마을 바로 열기</button>
        <div class="small">상용 버전에서는 이 과정이 자동으로 실행됩니다.</div>
      </div>
    </div>
    <script>
      const BUILD_ID = '1.0-rc.3';
      const statusEl = document.getElementById('status');
      const go = document.getElementById('go');
      async function cleanup() {
        try {
          if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.filter((r) => r.scope.includes('/CardVille/')).map((r) => r.unregister()));
          }
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.filter((key) => key.startsWith('cardville-cache-')).map((key) => caches.delete(key)));
          }
          localStorage.setItem('cardville.cache.migration.' + BUILD_ID, 'done');
          localStorage.setItem('cardville.currentBuildId', BUILD_ID);
          statusEl.textContent = '자동 복구 완료. 최신 버전으로 이동합니다.';
        } catch (error) {
          statusEl.textContent = '자동 복구 중 문제가 있었지만 최신 버전 열기를 계속 시도합니다.';
          console.warn(error);
        }
      }
      function openGame() { location.replace('/CardVille/?cv_cache_migrated=' + BUILD_ID + '&t=' + Date.now()); }
      go.addEventListener('click', openGame);
      cleanup().then(() => setTimeout(openGame, 700));
    </script>
  </body>
</html>
