<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>CardVille Reset</title></head><body style="font-family:system-ui;background:#071126;color:white;display:grid;place-items:center;min-height:100vh"><main><h1>CardVille Reset</h1><p id="msg">캐시를 정리하고 있어요.</p><p><a style="color:#8fd3ff" href="/CardVille/">게임으로 이동</a></p></main><script>(async()=>{try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}if('caches'in window){const names=await caches.keys();await Promise.all(names.filter(n=>n.toLowerCase().includes('cardville')).map(n=>caches.delete(n)));}document.getElementById('msg').textContent='정리 완료. 게임으로 이동해도 됩니다.';}catch(e){document.getElementById('msg').textContent='정리 중 오류가 있었지만 게임 이동은 가능합니다.';}})();</script></body></html>
