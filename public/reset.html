<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>CardVille Reset</title></head><body style="margin:0;background:#071126;color:white;font-family:system-ui;display:grid;place-items:center;min-height:100vh"><main style="width:min(420px,90vw);padding:24px;border-radius:24px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22)"><h1>CardVille 1.0.16 Reset</h1><p>이 페이지는 예전 캐시와 로컬 임시 상태를 정리합니다.</p><button id="go" style="font-size:18px;padding:14px 18px;border-radius:16px;border:0;background:#ffd86f;font-weight:900">정리 후 게임 열기</button><p id="note"></p></main><script>document.getElementById('go').onclick=async()=>{document.getElementById('note').textContent='정리 중...';try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()))}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.filter(k=>k.includes('cardville')).map(k=>caches.delete(k)))}}catch(e){console.warn(e)}location.replace('/CardVille/?reset=1&t='+Date.now())}</script></body></html>
