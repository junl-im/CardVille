name: Deploy CardVille to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: cardville-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund --no-package-lock

      - name: Verify and build
        run: npm run verify

      - name: Write deploy proof
        run: |
          cat > dist/deploy-proof.html <<HTML
          <!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>CardVille 1.0.7 Deploy Proof</title><style>body{margin:0;background:#071126;color:white;font-family:system-ui;display:grid;place-items:center;min-height:100vh}.box{width:min(420px,90vw);padding:24px;border-radius:24px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25)}</style></head><body><main class="box"><h1>CardVille Deploy OK</h1><p>version: <b>1.0.7</b></p><p>run: ${GITHUB_RUN_ID}</p><p><a style="color:#8fd3ff" href="/CardVille/">게임 열기</a></p></main></body></html>
          HTML
          cat > dist/version.json <<JSON
          {"name":"CardVille","version":"1.0.7","runId":"${GITHUB_RUN_ID}","sha":"${GITHUB_SHA}"}
          JSON
          echo 'dist root:'
          find dist -maxdepth 1 -type f -printf '%f\n' | sort
          echo 'dist assets:'
          find dist/assets -maxdepth 1 -type f -printf '%f\n' | sort | head -30

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Print URL
        run: echo "${{ steps.deployment.outputs.page_url }}"
